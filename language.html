<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
<title>Language Selection - Trio Soft</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <link rel="stylesheet" href="assets/css/tailwind.css" />
    <script type="module" src="dist/main.js"></script>
</head>
<body>
<div class="relative flex size-full min-h-screen flex-col bg-slate-50 group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
    <div class="layout-container flex h-full grow flex-col">
        <trio-site-header locale="en"></trio-site-header>
        <div class="flex flex-1 justify-center items-center py-5">
            <div class="flex flex-col max-w-[960px] w-full px-4">
                <div class="flex flex-col gap-8 items-center justify-center py-20">
                    <div class="flex flex-col gap-4 text-center">
                        <h1 class="text-[#0e141b] text-4xl font-black leading-tight tracking-[-0.033em]">
                            Select Language / 言語を選択
                        </h1>
                        <p class="text-[#4d7399] text-base font-normal leading-normal">
                            Choose your preferred language / お好みの言語を選択してください
                        </p>
                    </div>
                    <div class="flex flex-col gap-4 w-full max-w-md">
                        <a href="/" class="flex items-center justify-between gap-4 rounded-xl border border-[#d0dbe7] bg-white p-6 hover:bg-slate-50 transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="flex h-12 w-12 items-center justify-center rounded-full bg-[#e7edf3]">
                                    <span class="text-2xl">🇺🇸</span>
                                </div>
                                <div class="flex flex-col">
                                    <h3 class="text-[#0e141b] text-lg font-bold leading-tight">English</h3>
                                    <p class="text-[#4d7399] text-sm font-normal leading-normal">English version</p>
                                </div>
                            </div>
                            <div class="text-[#0e141b]" data-icon="CaretRight" data-size="24px" data-weight="regular">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                                    <path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"></path>
                                </svg>
                            </div>
                        </a>
                        <a href="/jp/" class="flex items-center justify-between gap-4 rounded-xl border border-[#d0dbe7] bg-white p-6 hover:bg-slate-50 transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="flex h-12 w-12 items-center justify-center rounded-full bg-[#e7edf3]">
                                    <span class="text-2xl">🇯🇵</span>
                                </div>
                                <div class="flex flex-col">
                                    <h3 class="text-[#0e141b] text-lg font-bold leading-tight">日本語</h3>
                                    <p class="text-[#4d7399] text-sm font-normal leading-normal">日本語版</p>
                                </div>
                            </div>
                            <div class="text-[#0e141b]" data-icon="CaretRight" data-size="24px" data-weight="regular">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                                    <path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"></path>
                                </svg>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <trio-site-footer></trio-site-footer>
    </div>
</div>
</body>
</html>
