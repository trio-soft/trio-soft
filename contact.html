<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
<title>Trio Soft</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <link rel="stylesheet" href="assets/css/tailwind.css" />
    <script type="module" src="dist/main.js"></script>
</head>
<body>
<div class="relative flex size-full min-h-screen flex-col bg-gray-50 group/design-root overflow-x-hidden" style='font-family: Inter, "Noto Sans", sans-serif;'>
    <div class="layout-container flex h-full grow flex-col">
        <trio-site-header locale="en"></trio-site-header>
        <div class="px-40 flex flex-1 justify-center py-5">
            <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
                <div class="flex flex-wrap justify-between gap-3 p-4">
                    <div class="flex min-w-72 flex-col gap-3">
                        <p class="text-[#111518] tracking-light text-[32px] font-bold leading-tight">Contact Us</p>
                        <p class="text-[#5e7387] text-sm font-normal leading-normal">We're here to help. Reach out to us for any inquiries or support.</p>
                    </div>
                </div>
                <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                    <label class="flex flex-col min-w-40 flex-1">
                        <p class="text-[#111518] text-base font-medium leading-normal pb-2">Name</p>
                        <input
                                placeholder="Your Name"
                                class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#d5dce2] bg-gray-50 focus:border-[#d5dce2] h-14 placeholder:text-[#5e7387] p-[15px] text-base font-normal leading-normal"
                                value=""
                        />
                    </label>
                </div>
                <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                    <label class="flex flex-col min-w-40 flex-1">
                        <p class="text-[#111518] text-base font-medium leading-normal pb-2">Email</p>
                        <input
                                placeholder="Your Email"
                                class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#d5dce2] bg-gray-50 focus:border-[#d5dce2] h-14 placeholder:text-[#5e7387] p-[15px] text-base font-normal leading-normal"
                                value=""
                        />
                    </label>
                </div>
                <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                    <label class="flex flex-col min-w-40 flex-1">
                        <p class="text-[#111518] text-base font-medium leading-normal pb-2">Subject</p>
                        <input
                                placeholder="Subject"
                                class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#d5dce2] bg-gray-50 focus:border-[#d5dce2] h-14 placeholder:text-[#5e7387] p-[15px] text-base font-normal leading-normal"
                                value=""
                        />
                    </label>
                </div>
                <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
                    <label class="flex flex-col min-w-40 flex-1">
                        <p class="text-[#111518] text-base font-medium leading-normal pb-2">Message</p>
                        <textarea
                                placeholder="Your Message"
                                class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#111518] focus:outline-0 focus:ring-0 border border-[#d5dce2] bg-gray-50 focus:border-[#d5dce2] min-h-36 placeholder:text-[#5e7387] p-[15px] text-base font-normal leading-normal"
                        ></textarea>
                    </label>
                </div>
                <div class="flex px-4 py-3 justify-start">
                    <button
                            class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 bg-[#bcd1e5] text-[#111518] text-sm font-bold leading-normal tracking-[0.015em]"
                    >
                        <span class="truncate">Submit</span>
                    </button>
                </div>
                <h2 class="text-[#111518] text-[22px] font-bold leading-tight tracking-[-0.015em] px-4 pb-3 pt-5">Contact Information</h2>
                <p class="text-[#111518] text-base font-normal leading-normal pb-3 pt-1 px-4">Address: Room 414, 4th Floor, Helios Kannai Building, 3-21-2 Motohama-cho, Naka-ku, Yokohama-shi, Kanagawa, Japan</p>
                <p class="text-[#111518] text-base font-normal leading-normal pb-3 pt-1 px-4">Phone: 09-1030-9865</p>
                <p class="text-[#111518] text-base font-normal leading-normal pb-3 pt-1 px-4">Email: info@triosoft.com</p>
                <div class="flex px-4 py-3">
                    <div class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-xl object-cover">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d13000.749442277467!2d139.6295169!3d35.4501557!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60185cf783637a3d%3A0xf5fc887b7ca7b451!2z5pel5pys44CSMjMxLTAwMDQgS2FuYWdhd2EsIFlva29oYW1hLCBOYWthIFdhcmQsIE1vdG9oYW1hY2jFjSwgMy1jaMWNbWXiiJIyMS0yIOODmOODquOCquOCuemWouWGheODk-ODqyA0NDE0!5e0!3m2!1szh-TW!2sde!4v1753498457617!5m2!1szh-TW!2sde" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
            </div>
        </div>
        <trio-site-footer></trio-site-footer>
    </div>
</div>
</body>
</html>
